<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Кіру - AI Study Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Жүйеге кіру</h3>
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Пайдаланушы аты</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Құпия сөз</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Кіру</button>
                        </form>
                        <p class="mt-3 text-center">Аккаунт жоқ па? <a href="/register">Тіркеліңіз</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
